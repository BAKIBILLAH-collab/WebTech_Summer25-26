<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>

<body>

<div class="container1">



<form action="#" method="post">

<fieldset>
<legend> Bank Account Registration </legend>

<table>

<tr>
<td><label> Account Holder Name: </label></td>
<td><input type="text" name="holdername"></td>
</tr>


<tr>
<td><label> Phone No: </label></td>
<td><input type="text" name="phone"></td>
</tr>


<tr>
<td><label> Email: </label></td>
<td><input type="email" name="email"></td>
</tr>


<tr>
<td><label> Address: </label></td>
<td>
<textarea name="address" cols="20" rows="5" style="resize:none"></textarea>
</td>
</tr>


<tr>
<td><label> Gender: </label></td>

<td>
<input type="radio" id="male" name="gender" value="Male">
<label for="male">Male</label>

<input type="radio" id="female" name="gender" value="Female">
<label for="female">Female</label>
</td>

</tr>


</table>

</fieldset>

</form>

</div>



<br>



<div class="container2">

<form action="#" method="post">

<fieldset>

<legend> Personal Account Info </legend>

<table>


<tr>
<td><label> User Name: </label></td>
<td><input type="text" name="username"></td>
</tr>


<tr>
<td><label> Password: </label></td>
<td><input type="password" name="password"></td>
</tr>


<tr>
<td><label> Confirm Password: </label></td>
<td><input type="password" name="confirmpassword"></td>
</tr>


<tr>
<td>
<input type="submit" value="Sign Up">
</td>
</tr>


</table>


</fieldset>

</form>

</div>


</body>
</html>
